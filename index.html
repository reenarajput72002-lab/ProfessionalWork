<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* Navbar */
    nav {
      background-color: #222;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    nav a:hover {
      color: orange;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      padding: 50px;
      background-color: #f4f4f4;
    }

    .hero img {
      border-radius: 50%;
    }

    /* Section */
    .section {
      padding: 40px;
      text-align: center;
    }

    /* Contact Form */
    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background-color: black;
      color: white;
      border: none;
    }

    button:hover {
      background-color: orange;
    }

  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Hi, I'm Reena 👋</h1>
    <p>I am learning Web Development</p>
    <img src="https://via.placeholder.com/150" alt="My Photo">
  </div>

  <!-- About Section -->
  <div class="section" id="about">
    <h2>About Me</h2>
    <p>I am a beginner web developer. I can create simple websites using HTML and CSS.</p>
  </div>

  <!-- Contact Section -->
  <div class="section" id="contact">
    <h2>Contact Me</h2>

    <input type="text" placeholder="Enter your name"><br>
    <input type="email" placeholder="Enter your email"><br>
    <textarea placeholder="Your message"></textarea><br>

    <button>Send</button>
  </div>

</body>
</html>
